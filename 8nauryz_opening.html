<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Наурыз құтты болсын</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#ff9a9e,#fecfef,#ffe4e1);
background-size:400% 400%;
animation:bg 15s infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
text-align:center;
padding-top:120px;
color:white;
}

h1{
font-size:50px;
text-shadow:2px 2px 10px #ff1493;
}

p{
font-size:20px;
max-width:700px;
margin:auto;
margin-top:20px;
}

button{
margin-top:30px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff1493;
color:white;
cursor:pointer;
}

button:hover{
background:#ff0066;
}

.heart{
position:absolute;
font-size:30px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(120vh)}
}

.message{
margin-top:40px;
font-size:22px;
color:#fff;
}
</style>
</head>

<body>

<div class="container">

<h1>🌸 8 Наурыз құтты болсын! 🌸</h1>

<p>
Құрметті арулар!  
Сіздерді Халықаралық әйелдер күнімен шын жүректен құттықтаймын.  
Әрқашан әдемі, бақытты және күлімдеп жүре беріңіздер!
</p>

<button onclick="showText()">Құттықтауды ашу</button>

<div class="message" id="msg"></div>

</div>

<script>
function showText(){
document.getElementById("msg").innerHTML =
"Сіз әлемдегі ең керемет жансыз! 💐";
}

for(let i=0;i<40;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=3+Math.random()*5+"s";
heart.style.fontSize=20+Math.random()*30+"px";
document.body.appendChild(heart);
}
</script>

</body>
</html>
